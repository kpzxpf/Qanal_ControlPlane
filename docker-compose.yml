version: "3.9"

# ── Local development stack ──────────────────────────────────────────────────
#  Starts PostgreSQL + Redis so you can run ControlPlane from your IDE.
#  Usage:  docker compose up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  postgres:
    image: postgres:16-alpine
    container_name: qanal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       qanal
      POSTGRES_USER:     qanal
      POSTGRES_PASSWORD: qanal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qanal -d qanal"]
      interval: 10s
      timeout:  5s
      retries:  5

  redis:
    image: redis:7-alpine
    container_name: qanal-redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no --loglevel warning
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  3s
      retries:  5

volumes:
  postgres_data:
